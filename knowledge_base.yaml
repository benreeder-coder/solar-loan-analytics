glossary:
  capital_markets:
    delinquency: "Loan is 30+ days past due on payment"
    vintage: "Loans originated in the same time period (quarter)"
    seasoning: "How long a loan has been outstanding; more seasoning = more time to observe performance"
    mix shift: "Change in the composition of originations across risk tiers"
    loss provisioning: "Setting aside reserves to cover expected losses from delinquent/defaulted loans"
    spread: "Difference between two rates; here, utility cost minus solar cost"
    counterfactual: "What would have happened under different assumptions (e.g., constant credit mix)"

  operations:
    installer partner: "The solar installation company that built the system"
    system size: "Capacity of the installed solar panel system in kilowatts"
    savings spread: "How much cheaper (or more expensive) solar is vs the local utility"
    negative spread: "Borrower is paying more for solar electricity than they would for utility power"

# Solar Loan Portfolio: Domain Knowledge Base
# This file encodes tribal knowledge for the conversational analytics engine.
# Every definition, formula, and caveat here is the single source of truth.

columns:
  loan_id:
    dtype: string
    business_meaning: "Unique loan identifier. Format: L0001-L2450."
    example_values: ["L0001", "L1234", "L2450"]

  origination_date:
    dtype: date
    business_meaning: "Date the loan was funded. Use for vintage/cohort analysis. Derive quarter as 'YYYY QN'."
    example_values: ["2024-01-18", "2025-06-15"]

  state:
    dtype: string
    business_meaning: "2-letter US state code for the solar installation. Solar production and utility costs vary significantly by state."
    enum_values: ["AZ", "CA", "CO", "CT", "FL", "MA", "NC", "NJ", "NY", "TX"]

  credit_tier:
    dtype: string
    business_meaning: "Borrower credit risk tier at origination. Primary risk stratification for the portfolio."
    enum_values: ["A", "B", "C"]
    tier_labels:
      A: "Prime"
      B: "Near-prime"
      C: "Subprime"

  loan_amount:
    dtype: float
    business_meaning: "Loan principal in USD. Highly correlated with system_size_kw."
    unit: "USD"

  system_size_kw:
    dtype: float
    business_meaning: "Installed solar system capacity in kilowatts."
    unit: "kW"

  loan_term_months:
    dtype: int
    business_meaning: "Repayment term in months. Discrete set of allowed values."
    enum_values: [120, 180, 240, 300]
    labels:
      120: "10 years"
      180: "15 years"
      240: "20 years"
      300: "25 years"

  interest_rate:
    dtype: float
    business_meaning: "Annual interest rate as a percentage (e.g., 5.25 means 5.25%). Higher rates correspond to riskier credit tiers."
    unit: "%"

  monthly_payment:
    dtype: float
    business_meaning: "Monthly loan payment amount in USD. What the borrower pays each month."
    unit: "USD"

  installer_partner:
    dtype: string
    business_meaning: "The solar installation company that performed the install. 5 partners in the portfolio."
    enum_values:
      - "Apex Solar Co"
      - "BrightPath Solar"
      - "GreenRoof Energy"
      - "SunPro Electric"
      - "TerraWatt Installations"

  cents_per_watt_of_solar_electricity:
    dtype: float
    business_meaning: "Proxy for what the borrower pays per unit of solar energy. See caveats for unit ambiguity."
    unit: "cents (per watt or per kWh - ambiguous)"

  cents_per_watt_of_utility_electricity:
    dtype: float
    business_meaning: "Average local utility electricity cost. Baseline for calculating whether solar saves the borrower money."
    unit: "cents (per watt or per kWh - ambiguous)"

  is_delinquent:
    dtype: bool
    business_meaning: "TRUE if the loan is 30+ days past due. This is a point-in-time snapshot, NOT a time-series status. There is no monthly payment history."
    values: [true, false]

  days_past_due:
    dtype: int
    business_meaning: "Number of days past due. 0 if current, 30+ if delinquent. Use for severity analysis among delinquent loans."
    unit: "days"


derived_metrics:
  savings_spread:
    formula: "cents_per_watt_of_utility_electricity - cents_per_watt_of_solar_electricity"
    pandas: "df['cents_per_watt_of_utility_electricity'] - df['cents_per_watt_of_solar_electricity']"
    description: "Difference between utility cost and solar cost. Positive means borrower saves money with solar. Negative means solar costs more than utility."
    unit: "cents"
    caveats: ["cents_per_watt_unit_ambiguity"]

  savings_rate_pct:
    formula: "(savings_spread / cents_per_watt_of_utility_electricity) * 100"
    pandas: "((df['cents_per_watt_of_utility_electricity'] - df['cents_per_watt_of_solar_electricity']) / df['cents_per_watt_of_utility_electricity']) * 100"
    description: "Percentage savings relative to utility cost."
    unit: "%"
    caveats: ["cents_per_watt_unit_ambiguity"]

  origination_quarter:
    formula: "YYYY QN from origination_date"
    pandas: "df['origination_date'].apply(lambda d: f\"{d.year} Q{(d.month-1)//3+1}\")"
    description: "The calendar quarter when the loan was funded. Used for cohort/vintage analysis."

  delinquency_rate:
    formula: "count(is_delinquent=TRUE) / count(all)"
    pandas: "group['is_delinquent'].mean() * 100"
    description: "Percentage of loans that are 30+ days past due within a group."
    unit: "%"

  mix_adjusted_delinquency:
    formula: "sum(reference_tier_share * current_tier_delinquency_rate) for each tier"
    description: "What the overall delinquency rate would be if credit tier proportions matched a reference quarter (default: 2024 Q1). Isolates credit mix shift from true performance change."
    reference_quarter: "2024 Q1"
    reference_shares:
      A: 0.62
      B: 0.32
      C: 0.06

  negative_spread_flag:
    formula: "savings_spread < 0"
    pandas: "(df['cents_per_watt_of_utility_electricity'] - df['cents_per_watt_of_solar_electricity']) < 0"
    description: "TRUE if borrower is paying more for solar than they would for utility electricity."


business_rules:
  delinquent_definition: "A loan is delinquent if it is 30 or more days past due (days_past_due >= 30)."
  credit_tiers:
    A: "Prime borrowers. Lowest risk. Typical delinquency rate: 1-4%."
    B: "Near-prime borrowers. Moderate risk. Typical delinquency rate: 6-10%."
    C: "Subprime borrowers. Highest risk. Typical delinquency rate: 19-34%."
  dpd_severity_bands:
    early: "30-59 days past due. Early-stage delinquency."
    mid: "60-89 days past due. Moderate delinquency."
    late: "90-119 days past due. Serious delinquency."
    severe: "120+ days past due. Severe delinquency, likely headed to default."
  spread_interpretation:
    positive: "Borrower saves money with solar vs utility. Higher spread = stronger value proposition."
    negative: "Borrower pays MORE for solar than utility. Negative spread correlates with higher delinquency."
    zero: "Breakeven. Borrower pays roughly the same."


caveats:
  cents_per_watt_unit_ambiguity:
    text: "The 'cents per watt' columns are labeled 'cents per watt' in the data but may actually represent cents per kWh. The unit has not been confirmed with the client. Use these columns for relative comparisons (e.g., savings spread direction and magnitude) but caveat any absolute claims about utility savings."
    triggers: ["cents_per_watt", "savings", "spread", "utility", "solar cost", "electricity cost"]

  point_in_time_snapshot:
    text: "is_delinquent is a point-in-time snapshot, not a time series. We do not have monthly payment status history. A loan marked current today may have been delinquent previously, and vice versa. Delinquency rates represent the portfolio's state at the snapshot date, not cumulative lifetime delinquency."
    triggers: ["delinquency rate", "trend", "over time", "changed"]

  cohort_age_bias:
    text: "Newer loan cohorts have had less time to become delinquent. Q4 2025 loans are the youngest vintage and have had the least seasoning. Despite this, Q4 2025 shows the highest delinquency rate, meaning the true signal is likely understated, not overstated."
    triggers: ["cohort", "vintage", "trend", "Q4 2025", "newest"]

  no_external_data:
    text: "This analysis uses only the portfolio data. No external economic data (unemployment, interest rate environment, housing market) is incorporated. Conclusions are limited to what the loan-level data shows."
    triggers: ["economy", "macro", "external", "why", "cause"]


known_insights:
  - id: "rising_delinquency"
    finding: "Overall delinquency rose from 4.8% in Q1 2024 to 15.3% in Q4 2025."
    detail: "This 3x increase in the headline rate is alarming at face value but is explained by credit mix shift."

  - id: "mix_shift_root_cause"
    finding: "The primary driver is a shift in credit mix toward subprime. Tier C share of originations went from 6% in Q1 2024 to 44% in Q4 2025. Tier A share dropped from 62% to 30%."
    detail: "This is a mix problem, not a performance problem. The portfolio is originating riskier loans, not seeing existing loans deteriorate."

  - id: "within_tier_stability"
    finding: "Within-tier delinquency rates are relatively stable. Tier A: 1-4%, Tier B: 6-10%, Tier C: 19-34% across all quarters."
    detail: "The underwriting standards within each tier appear to be working consistently."

  - id: "cohort_age_understates"
    finding: "Newer cohorts have had less time to go delinquent, so Q4 2025's 15.3% rate is likely understated."
    detail: "The cohort age bias works in favor of the finding: the real delinquency trajectory may be worse than the snapshot shows."

  - id: "spread_correlation"
    finding: "Negative savings spread (borrower pays more for solar than utility) correlates with higher delinquency, especially in Tier C."
    detail: "Loans where solar costs exceed utility costs have weaker borrower value proposition, which may reduce payment priority. Tier C at <-2 spread = 54.9% delinquency vs 13.1% at 10+ spread."

  - id: "interest_rate_tiers"
    finding: "Interest rates are strongly tiered: Tier A avg 5.05%, Tier B 7.50%, Tier C 11.04%. Within-tier rates are stable over time."
    detail: "Interest rate has the strongest correlation with delinquency (0.306) among available metrics, but this is largely a proxy for credit tier."

  - id: "concentration_stable"
    finding: "Geographic and installer concentration is stable. Top 3 states (CA, TX, FL) = 46.4% of volume. Tier C is not notably more concentrated than the overall portfolio."
    detail: "No single state or installer is disproportionately driving the delinquency increase."

  - id: "system_size_no_effect"
    finding: "System size has no meaningful relationship with delinquency. Rates are flat (10-14%) across all size bands."
    detail: "System size can be dismissed as a risk factor."

  - id: "state_tier_outliers"
    finding: "TX has the worst Tier C delinquency at 40.8%, followed by FL at 34.0%. CA has the lowest Tier C rate at 15.5%."
    detail: "State-level variation within Tier C suggests geographic factors (utility costs, solar production, regulations) interact with credit risk."

  - id: "payment_burden"
    finding: "Tier C borrowers pay significantly more monthly ($338 avg) than Tier A ($222), driven by higher interest rates on similar loan amounts."
    detail: "Higher payment burden combined with weaker credit profiles creates compounding risk."


